<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Emergency Numbers India</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
  font-family:'Poppins',sans-serif;
  margin:0;
  background:#f4f6f9;
}

/* NAVBAR */
.navbar{
  background:#c62828 !important;
}
.navbar-brand{
  font-weight:700;
  font-size:1.5rem;
}

/* HERO */
.hero{
  background:
  linear-gradient(rgba(0,0,0,0.65),rgba(0,0,0,0.65)),
  url('images/bg.jpg');
  background-size:cover;
  background-position:center;
  color:white;
  padding:110px 20px;
  text-align:center;
}

.hero h1{
  font-size:3rem;
  font-weight:700;
}

.hero p{
  font-size:1.1rem;
  margin-bottom:25px;
}

/* SEARCH BAR */
#searchInput{
  border-radius:30px;
  padding:12px 20px;
}

/* CARDS */
.card-box{
  background:white;
  border-radius:12px;
  overflow:hidden;
  box-shadow:0 6px 18px rgba(0,0,0,0.1);
  transition:0.3s;
  height:100%;
}

.card-box:hover{
  transform:translateY(-6px);
}

.card-box img{
  width:100%;
  height:200px;
  object-fit:cover;
}

.card-body-custom{
  padding:18px;
  text-align:center;
}

.card-number{
  font-size:1.6rem;
  font-weight:700;
  color:#c62828;
}

/* PANIC BUTTON */
.panic-btn{
  font-weight:600;
  letter-spacing:1px;
}

/* FOOTER */
footer{
  background:#212529;
  color:white;
  padding:20px;
  text-align:center;
  margin-top:60px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark">
<div class="container">
<a class="navbar-brand" href="#">India Emergency</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">
<ul class="navbar-nav ms-auto">
  <li class="nav-item">
    <a class="nav-link active" href="index.html">Home</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="about.html">About</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="services.html">Services</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="safety.html">Safety Tips</a>
  </li>
  <li class="nav-item">
    <a class="nav-link" href="contact.html">Contact</a>
  </li>
</ul>
</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<div class="container">
<h1>Emergency Numbers India</h1>
<p>Instant access to critical help across India</p>

<button id="whatsappSOS" class="btn btn-success btn-lg me-2">WhatsApp SOS</button>
<button id="panicBtn" class="btn btn-danger btn-lg panic-btn">PANIC BUTTON</button>
</div>
</section>

<!-- MAIN -->
<main class="container my-5">

<input type="text" id="searchInput" class="form-control mb-4" placeholder="Search emergency service...">

<div class="row g-4" id="cardsGrid"></div>

</main>

<footer>
© 2026 Emergency Services India | Educational Project
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const services=[
{title:"Police",number:"100",img:"images/police.jpg"},
{title:"Ambulance",number:"102",img:"images/ambulance.jpg"},
{title:"Fire",number:"101",img:"images/fire.jpg"},
{title:"Women Helpline",number:"1091",img:"images/women.jpg"},
{title:"Child Helpline",number:"1098",img:"images/child.jpg"},
{title:"Cyber Crime",number:"1930",img:"images/cyber.jpg"},
{title:"Tourist Helpline",number:"1363",img:"images/tourist.jpg"},
{title:"Road Accident",number:"1073",img:"images/road.jpg"},
{title:"Disaster Management",number:"108",img:"images/disaster.jpg"}
];

const grid=document.getElementById("cardsGrid");

services.forEach(s=>{
grid.innerHTML+=`
<div class="col-12 col-md-6 col-lg-4">
<div class="card-box">
<img src="${s.img}" alt="${s.title}">
<div class="card-body-custom">
<h5>${s.title}</h5>
<div class="card-number">${s.number}</div>
<a href="tel:${s.number}" class="btn btn-danger mt-2 w-100">Call Now</a>
</div>
</div>
</div>
`;
});

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",function(){
const value=this.value.toLowerCase();
document.querySelectorAll(".card-box").forEach(card=>{
const title=card.querySelector("h5").textContent.toLowerCase();
card.parentElement.style.display=title.includes(value)?"block":"none";
});
});

/* WHATSAPP SOS */
document.getElementById("whatsappSOS").addEventListener("click",function(){
navigator.geolocation.getCurrentPosition(function(position){
let lat=position.coords.latitude;
let lon=position.coords.longitude;
let message=`I need help. My location: https://www.google.com/maps?q=${lat},${lon}`;
let url=`https://api.whatsapp.com/send?text=${encodeURIComponent(message)}`;
window.location.href=url;
});
});

/* PANIC BUTTON */
document.getElementById("panicBtn").addEventListener("click",function(){
document.getElementById("whatsappSOS").click();
});
</script>

</body>
</html>
